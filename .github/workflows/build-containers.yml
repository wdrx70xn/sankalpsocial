name: Build Containers
'on':
  workflow_dispatch: null
  push:
    tags:
    - '*'
jobs:
  build-containers-common:
    runs-on: ubuntu-latest
    outputs:
      containerver: ${{ steps.getcontainerver.outputs.containerver }}
    steps:
    - name: Get Container Version
      id: getcontainerver
      run: 'echo "containerver=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

        '
  build-containers:
    needs: build-containers-common
    strategy:
      matrix:
        include:
        - runnertags: ubuntu-latest
          arch: amd64
        - runnertags: ubuntu-latest
          arch: arm64
    runs-on: ${{ matrix.runnertags }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to ghcr
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - name: Build and Push Image
      env:
        CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
        NEXT_PUBLIC_VERSION: ${{ github.ref_name }}
      run: "docker buildx build --platform linux/${{ matrix.arch }} \\\n  -f Dockerfile.dev\
        \ \\\n  -t ghcr.io/gitroomhq/postiz-app:${{ env.CONTAINERVER }}-${{ matrix.arch\
        \ }} \\\n  --build-arg NEXT_PUBLIC_VERSION=${{ env.NEXT_PUBLIC_VERSION }}\
        \ \\\n  --provenance=false --sbom=false \\\n  --output \"type=registry,name=ghcr.io/gitroomhq/postiz-app:${{\
        \ env.CONTAINERVER }}-${{ matrix.arch }}\" .\n"
  build-container-manifest:
    needs:
    - build-containers
    - build-containers-common
    runs-on: ubuntu-latest
    steps:
    - name: Login to ghcr
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - name: Create Docker Manifest
      env:
        CONTAINERVER: ${{ needs.build-containers-common.outputs.containerver }}
      run: "# Verify the architecture images\necho \"Verifying AMD64 image:\"\ndocker\
        \ buildx imagetools inspect ghcr.io/gitroomhq/postiz-app:${{ env.CONTAINERVER\
        \ }}-amd64\n\necho \"Verifying ARM64 image:\"\ndocker buildx imagetools inspect\
        \ ghcr.io/gitroomhq/postiz-app:${{ env.CONTAINERVER }}-arm64\n\n# Try to remove\
        \ any existing manifests first\ndocker manifest rm ghcr.io/gitroomhq/postiz-app:${{\
        \ env.CONTAINERVER }} || true\ndocker manifest rm ghcr.io/gitroomhq/postiz-app:latest\
        \ || true\n\n# Create and push the version-specific manifest\ndocker manifest\
        \ create ghcr.io/gitroomhq/postiz-app:${{ env.CONTAINERVER }} \\\n  --amend\
        \ ghcr.io/gitroomhq/postiz-app:${{ env.CONTAINERVER }}-amd64 \\\n  --amend\
        \ ghcr.io/gitroomhq/postiz-app:${{ env.CONTAINERVER }}-arm64\n\ndocker manifest\
        \ push ghcr.io/gitroomhq/postiz-app:${{ env.CONTAINERVER }}\n\n# Create and\
        \ push the latest manifest\ndocker manifest create ghcr.io/gitroomhq/postiz-app:latest\
        \ \\\n  --amend ghcr.io/gitroomhq/postiz-app:${{ env.CONTAINERVER }}-amd64\
        \ \\\n  --amend ghcr.io/gitroomhq/postiz-app:${{ env.CONTAINERVER }}-arm64\n\
        \ndocker manifest push ghcr.io/gitroomhq/postiz-app:latest\n"
    - name: Verify Manifest
      run: 'docker manifest inspect ghcr.io/gitroomhq/postiz-app:latest

        '
